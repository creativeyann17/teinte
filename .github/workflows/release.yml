name: release

# Cut a release: git tag v1.2.3 && git push origin v1.2.3
# Both build legs are gated on `test` and run in parallel; the final
# `release` job publishes GitHub release notes + binaries.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      # Keep both legs running even if one fails — useful to see e.g.
      # a windows-only break alongside a linux success.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            binary: teinte
            archive: teinte-linux-amd64.tar.gz
          - os: windows-latest
            platform: windows
            arch: amd64
            binary: teinte.exe
            archive: teinte-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend deps
        run: cd frontend && bun install

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          wails build -tags webkit2_41 -o ${{ matrix.binary }} \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${GITHUB_SHA::7}"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          wails build -o ${{ matrix.binary }} \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${GITHUB_SHA::7}"

      - name: Archive (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist
          cp build/bin/${{ matrix.binary }} dist/
          tar -C dist -czf dist/${{ matrix.archive }} ${{ matrix.binary }}
          rm dist/${{ matrix.binary }}

      - name: Archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path build/bin/${{ matrix.binary }} -DestinationPath dist/${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
